# Default settings for AI File Brain.
# Override any value via environment variable: AFB_<UPPERCASE_FIELD>=...
# Example: AFB_WATCH_FOLDER="D:/notes"

watch_folder = "C:/Users/ASUS/Documents/AIFileBrainTest"
ollama_url = "http://127.0.0.1:11434"
chroma_path = "./chroma-data"
embedding_model = "nomic-embed-text"
chat_model = "llama3.2"
chunk_size = 2000
chunk_overlap = 400
top_k = 5

# Relevance gate (cosine distance: 0 = identical, 2 = opposite). Chunks farther
# than the ceiling are dropped before answering, so unrelated files stop showing
# up as "sources" and a topic with no real match returns a clean "not found".
# Lower = stricter. Filename-only stubs (.exe, .m4a …) embed just the name's
# words, so they get a looser ceiling.
max_match_distance = 0.5
max_filename_match_distance = 0.85

# OCR — scanned-PDF fallback only. Image files are name-only this phase (see
# name_only_extensions below), so this no longer affects images.
ocr_enabled = true
ocr_languages = ["en"]
ocr_use_gpu = true                 # GPU OCR via DirectML; auto-falls back to CPU if unavailable
pdf_ocr_min_native_chars = 50      # below this total, switch to per-page OCR fallback
pdf_ocr_per_page_min_chars = 10    # below this on a page, OCR that page
pdf_ocr_render_dpi = 220
pdf_ocr_max_pages = 0              # max pages to OCR per PDF (0 = unlimited)

# Backstop against runaway generated junk (lockfiles, bundles, DB dumps), NOT a
# memory guard: OCR streams page-by-page and text extraction is bounded, so large
# real documents index fine. 200 MiB by default; set 0 to disable the cap entirely.
max_file_size_bytes = 209715200

# Cap on extracted text chars per file (0 = unlimited). Huge default (~50 MB of
# text) so it only ever trims pathological data dumps, never real documents.
max_extracted_chars = 50000000

# How many files are indexed (extracted + embedded) at once during bulk scans.
# Keeps a huge watch root from flooding Ollama / exhausting memory.
max_concurrent_indexing = 4

# --- What gets indexed, in two tiers; anything in neither list is ignored. ---
# Tier 1 — full content extracted, chunked and embedded (needs an extractor).
content_extensions = [".txt", ".md", ".rst", ".pdf", ".docx", ".pptx", ".xlsx", ".ppt", ".xls", ".doc"]
# Tier 2 — filename only (name embedded as a stub, contents not read). Code,
# images (OCR off this phase), and a few extra doc/media/archive types.
name_only_extensions = [
    # source code — names only for now
    ".py", ".js", ".ts", ".tsx", ".jsx", ".java", ".cs", ".go", ".rs",
    ".rb", ".php", ".c", ".cpp", ".cc", ".h", ".hpp", ".sh", ".bash",
    ".ps1", ".sql",
    # images — OCR disabled this phase, so name-only
    ".png", ".jpg", ".jpeg", ".tif", ".tiff", ".bmp", ".webp", ".gif",
    # extra media / archives, by name
    ".mp4", ".zip",
]

# Smart exclusions: any path containing one of these directory names is
# skipped (case-insensitive). Edit this list in user-settings.toml to add
# project-specific noise without touching defaults.
excluded_dir_names = [
    "AppData",
    ".git",
    ".hg",
    ".svn",
    "node_modules",
    "__pycache__",
    ".venv",
    "venv",
    ".idea",
    ".vscode",
    "dist",
    "build",
    ".pytest_cache",
    ".ruff_cache",
    ".mypy_cache",
    "site-packages",
    "Recycle.Bin",
    "$RECYCLE.BIN",
]

excluded_extensions = [".lock", ".pyc", ".pyo", ".log", ".tmp", ".bak", ".ps1"]
